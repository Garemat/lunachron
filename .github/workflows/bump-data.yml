name: Bump lunachron-data

on:
  repository_dispatch:
    types: [data-release]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Configure git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Create branch and update pins
        env:
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          git checkout -b chore/data-$TAG
          echo "$TAG" > data.version
          git -C data fetch --quiet --tags
          git -C data checkout --quiet $TAG
          git add data.version data
          git commit -m "chore: bump lunachron-data to $TAG"
          git push origin chore/data-$TAG

      - name: Open PR and enable auto-merge
        env:
          TAG: ${{ github.event.client_payload.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: bump lunachron-data to $TAG" \
            --body "Automated bump to [$TAG](https://github.com/Garemat/lunachron-data/releases/tag/$TAG).

          - \`data.version\` — Gradle build-time download and runtime fetching
          - \`data/\` submodule — F-Droid source builds

          🤖 Automated via [bump-data workflow](https://github.com/Garemat/lunachron/actions/workflows/bump-data.yml)" \
            --base main
          gh pr merge --auto --squash
