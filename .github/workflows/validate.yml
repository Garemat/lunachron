name: Validate Build (Reusable)

on:
  workflow_call:
    inputs:
      pr_body:
        description: "PR description body for template validation"
        type: string
        required: false
        default: ''
      skip_pr_validation:
        description: "Skip PR template validation (Dependabot only)"
        type: boolean
        required: false
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate PR Template
        if: '!inputs.skip_pr_validation'
        env:
          PR_BODY: ${{ inputs.pr_body }}
        run: |
          echo "Validating PR description..."

          if echo "$PR_BODY" | sed -n '/## Checklist/,$p' | grep -q "\[ \]"; then
            echo "::error::Validation Failed: Please ensure all items in the 'Checklist' are completed and checked."
            exit 1
          fi

          echo "PR Template validation passed!"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lint

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Run tests
        run: ./gradlew test

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports
          path: '**/build/reports/*'

  instrumented-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD snapshot
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-${{ runner.os }}

      - name: Create AVD snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot created"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedAndroidTest

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-reports
          path: '**/build/reports/androidTests/*'
