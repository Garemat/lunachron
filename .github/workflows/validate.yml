name: Validate Build (Reusable)

on:
  workflow_call:
    inputs:
      pr_body:
        description: "PR description body for template validation"
        type: string
        required: false
        default: ''
      skip_pr_validation:
        description: "Skip PR template validation (Dependabot only)"
        type: boolean
        required: false
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate PR Template
        if: '!inputs.skip_pr_validation'
        env:
          PR_BODY: ${{ inputs.pr_body }}
        run: |
          echo "Validating PR description..."

          if ! echo "$PR_BODY" | grep -qEi "(- \[x\] (🐛 Bug fix|✨ New feature|💥 Breaking change|🧹 Chore))"; then
            echo "::error::Validation Failed: Please select at least one 'Type of Change' in your PR description."
            exit 1
          fi

          if echo "$PR_BODY" | sed -n '/## Checklist/,$p' | grep -q "\[ \]"; then
            echo "::error::Validation Failed: Please ensure all items in the 'Checklist' are completed and checked."
            exit 1
          fi

          echo "PR Template validation passed!"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lint

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: '**/build/reports/*'
