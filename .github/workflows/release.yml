name: Automated Release

on:
  pull_request:
    branches: [ "main" ]
    types: [ "closed" ]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Read version from build.gradle.kts
      id: version
      run: |
        VERSION_NAME=$(grep '^\s*versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
        IFS='.' read -r major minor patch <<< "$VERSION_NAME"
        VERSION_CODE=$(( major * 10000 + minor * 100 + patch ))
        NEW_TAG="v${VERSION_NAME}"
        # Safety: if tag already exists, increment patch
        while git tag | grep -qx "$NEW_TAG"; do
          patch=$((patch+1))
          VERSION_NAME="${major}.${minor}.${patch}"
          VERSION_CODE=$(( major * 10000 + minor * 100 + patch ))
          NEW_TAG="v${VERSION_NAME}"
        done
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

    - name: Install git-cliff
      uses: kenji-miyake/setup-git-cliff@v2

    - name: Extract release notes
      id: release_notes
      run: |
        NOTES=$(git cliff --unreleased --strip header)
        echo "notes<<EOF" >> $GITHUB_OUTPUT
        echo "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Tag release
      run: |
        git tag ${{ steps.version.outputs.new_tag }}
        git push origin ${{ steps.version.outputs.new_tag }}

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew testFdroidDebugUnitTest

    - name: Decode Keystore
      run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > app/release.keystore

    - name: Build Release APK and AAB
      env:
        KEYSTORE_PATH: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: ./gradlew assembleGithubRelease bundleGithubRelease bundleFdroidRelease

    - name: Write Play Store credentials to file
      run: echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > /tmp/play-service-account.json

    - name: Publish to Play Store internal track
      env:
        PLAY_SERVICE_ACCOUNT_JSON: /tmp/play-service-account.json
      run: ./gradlew publishGithubReleaseBundle

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.new_tag }}
        files: |
          app/build/outputs/apk/github/release/app-github-release.apk
          app/build/outputs/bundle/githubRelease/app-github-release.aab
          app/build/outputs/bundle/fdroidRelease/app-fdroid-release.aab
        name: Release ${{ steps.version.outputs.new_tag }}
        body: ${{ steps.release_notes.outputs.notes }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
