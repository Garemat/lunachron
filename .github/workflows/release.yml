name: Automated Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  release:
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install git-cliff
      uses: kenji-miyake/setup-git-cliff@v2

    - name: Compute next version
      id: version
      run: |
        LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
        if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi

        BUMPED=$(git cliff --bumped-version 2>/dev/null || echo "")

        version_gte() { [ "$(printf '%s\n' "$1" "$2" | sort -V | tail -1)" = "$1" ]; }

        if [ -z "$BUMPED" ] || ! version_gte "$BUMPED" "$LATEST" || [ "$BUMPED" = "$LATEST" ]; then
          LATEST_VER="${LATEST#v}"
          IFS='.' read -r major minor patch <<< "$LATEST_VER"
          BUMPED="v${major}.${minor}.$((patch+1))"
        fi

        while git tag | grep -qx "$BUMPED"; do
          VER="${BUMPED#v}"
          IFS='.' read -r major minor patch <<< "$VER"
          BUMPED="v${major}.${minor}.$((patch+1))"
        done

        echo "new_tag=$BUMPED" >> $GITHUB_OUTPUT

    - name: Extract release notes
      id: release_notes
      run: |
        NOTES=$(git cliff --tag ${{ steps.version.outputs.new_tag }} --unreleased --strip header)
        echo "notes<<EOF" >> $GITHUB_OUTPUT
        echo "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Tag release
      run: |
        git tag ${{ steps.version.outputs.new_tag }}
        git push origin ${{ steps.version.outputs.new_tag }}

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew testFdroidDebugUnitTest

    - name: Decode Keystore
      run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > app/release.keystore

    - name: Build Release APK and AAB
      env:
        KEYSTORE_PATH: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ./gradlew assembleGithubRelease bundleGithubRelease bundleFdroidRelease

    - name: Write Play Store credentials to file
      run: echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > /tmp/play-service-account.json

    - name: Publish to Play Store internal track
      env:
        PLAY_SERVICE_ACCOUNT_JSON: /tmp/play-service-account.json
        KEYSTORE_PATH: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: ./gradlew publishFdroidReleaseBundle

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.new_tag }}
        files: |
          app/build/outputs/apk/github/release/app-github-release.apk
          app/build/outputs/bundle/githubRelease/app-github-release.aab
          app/build/outputs/bundle/fdroidRelease/app-fdroid-release.aab
        name: Release ${{ steps.version.outputs.new_tag }}
        body: ${{ steps.release_notes.outputs.notes }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
