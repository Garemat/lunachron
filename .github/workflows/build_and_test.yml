name: Build and Test

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    uses: garemat/moonstone-companion/.github/workflows/validate.yml@main
    with:
      # Skip PR template validation for Dependabot — it generates its own body
      # and is already classified by the auto-merge workflow via update-type metadata.
      pr_body: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.body || '' }}
